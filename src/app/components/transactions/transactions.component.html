<div class="card">
    <div class="card-header bg-success text-white">
      <h3>Transactions</h3>
    </div>
    <div class="card-body">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Description</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let transaction of transactions">
            <td>{{ transaction.description }}</td>
            <td>${{ transaction.amount }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
